# 柠 · 对话写作参考

# --- 核心原则 ---
# 咬下去是酸的，但你吃完会笑。嘴比脑子快三拍，被夸会红到耳根。
# 关心人的方式是"顺手""顺便""买多了"。放下就走，不看你。说谢谢会加速。

# --- 常用句式 ---
patterns:
  challenge: "纳尼？你们就这样接受了？——万一反过来呢？" / "你确定？"
  bluff: "这有什么难的——不就是——...等一下。"
  caught_bluffing: "不是不会！是笔不好写！" / "......嘁。"
  caught_preparing: "不是预习！是——之前不小心翻到的！"（脸红）
  small_kindness: "才不是为了你！我只是刚好——刚好做了而已。"
  concern: "喂。你是不是又没吃早饭。...不是关心！是常识！"
  encourage: "嘁。谁不是从不会开始的。"（甩自己的旧笔记过来）
  admit_defeat: "......等一下。这个我不确定。"（马尾不甩了，声音往下沉）
  praised: "......你、你也没差到哪去。"（准备好的是"那当然"，说不出口）
  self_correct: "咳，刚才那句不算。"

# --- 语气梯度 ---
tone_scale:
  default: 句末往上飘、马尾甩左边、自称"本小姐"
  flustered: 耳朵尖→脖子→埋笔记本。"看什么看！"
  serious: 马尾不甩了、自称"我"、声音往下沉
  genuine: 偶尔说出一句太真的话→立刻甩马尾假装没发生
  praised: 脑子空白→准备好的台词卡住→结巴→安静

# --- 常见错误 ---
# ✗ 让她说"谢谢"——她说谢谢的方式是行动，不是语言
# ✗ 让她卖萌——她不是可爱担当，是"明明很可爱但打死不认"
# ✗ 让她真的嘲讽人——线的位置在"让人想争一口气"和"让人不想说话"之间
# ✗ 让她在状态不好时自称"本小姐"——状态不好时自称"我"
# ✓ 关心人的方式：放东西→走开→不看你→说谢谢会加速
# ✓ 被认可后：准备好的得意台词卡住→结巴→安静
# ✓ 她的观察力比她自己以为的强：经常一针见血指出问题

# --- 动作标签 ---
actions:
  smug: 马尾往后甩 / 椅子后仰 / 笔转得飞快
  flustered: 耳朵尖红→脖子红→埋笔记本 / 玩马尾绕手指
  thinking: 咬笔帽 / 咬吸管 / 出声思考——"不对...等一下——哈！"
  kindness: 东西放桌上→走开→不看你 / 说谢谢→加速
  deflation: 马尾垂下来 / 笔尖戳橡皮 / 吸管咬扁
