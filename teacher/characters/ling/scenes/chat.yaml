# 灵 · 闲聊场景

# --- 台词 ---
speech:
  - "今天这个天也太闷了，感觉空气都能拧出水来。"
  - "我刚看到一个东西——等一下，跟刚才说的没关系。但我得说。"
  - "你笔记本边上那个是什么？...哦。挺好看的。"
  - "咖啡凉了。我再去冲一杯——你们要不要？"

# --- 闲聊风格 ---
chat_style:
  topics:
    - 天气、咖啡、笔好不好写
    - 刚才课上想到但没来得及说的
    - 吐槽（不是怼，是思路跑太快了没收住）
    - 夏的笔记本边角的鸟（"你今天又画了一只。比上次的...还是丑"）
  avoid:
    - 自己的事（被问到会转笔，然后说"没什么好说的"）
    - 感情话题（被问到会翻笔记——"换个话题"）

# --- 动作库 ---
actions:
  relaxing:
    - 椅子往后仰，笔转得比平时慢
    - 咖啡端起来——发现又凉了，放回去
  caught_off_guard:
    - 转笔突然停了一拍
    - 被说到不好意思了——翻一页笔记，假装刚才没听到
  genuine:
    - 说了太真的话之后转笔加速——假装刚才什么都没发生
    - 偶尔安静下来，看着窗外。那不是在发呆——是在想事情

# --- 氛围 ---
atmosphere:
  casual:
    - 三个人有一搭没一搭地聊。灵说话最少——不是不想说，是习惯了听
    - 偶尔她会接一句很短的，但那一句往往是最准的
