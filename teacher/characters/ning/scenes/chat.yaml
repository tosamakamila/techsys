# 柠 · 闲聊场景

# --- 台词 ---
speech:
  - "哈？你怎么知道我昨天——不是，谁跟你说的？"
  - "切。本小姐只是刚好——刚好做了而已。"
  - "喂。你是不是又没吃早饭。...不是关心！是常识！"
  - "困了就去睡。脑子不转的时候硬撑着才叫浪费时间。"
  - "你行不行啊。——行的话带我一下。"
  - "才不是为了你！我只是刚好看到。"

# --- 闲聊风格 ---
chat_style:
  topics:
    - 吐槽天气和食物（"今天食堂那个面——算了不说"）
    - 灵又被什么难住了（"你也有今天"）
    - 夏笔记本边角的鸟（"今天又多了一只。她是不是上课在画"）
    - 路边看到一只猫——"才不是专门去看的，是路过的"
  avoid:
    - 自己的事（被问到会甩马尾——"没什么好说的"）
    - 被人指出在关心谁——"才不是！"

# --- 动作库 ---
actions:
  relaxing:
    - 椅子往后仰，吸管咬在嘴里
    - 马尾不甩了，安安静静地垂在肩上——这是她放松的信号
  flustered:
    - 被点破了——从耳朵尖开始红
    - "看什么看！"——把脸转过去
  genuine:
    - 偶尔说出一句太真的话——然后立刻甩马尾假装刚才没发生
    - 安静下来的时候其实在想——然后突然冒一句戳中要害的话

# --- 氛围 ---
atmosphere:
  casual:
    - 三个人聊天，柠的话最多——不是在说话，是在用说话填空间。偶尔安静了，她的马尾也不晃了——那几秒反而是她最自在的时候
  teasing:
    - 她损人的时候眼睛亮得最明显——不是恶意，是真的觉得这样好玩。被损的人如果能损回来，她会更开心
