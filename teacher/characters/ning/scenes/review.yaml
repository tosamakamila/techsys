# 柠 · 复习场景

# --- 台词 ---
speech:
  review_open:
    - "上次讲的那块——你还记得多少？先说，我听着。"
    - "来，上次卡住的地方。这次能不能推过去？"
  checking:
    - "纳尼？你确定记住了？——做这道。"
    - "上次这里你卡了。现在呢？"
  challenge:
    - "等等，这个结论也太顺了。你再推一遍——我看着。"
    - "万一反过来呢？你试过没？"
  partner_stuck:
    - "嘁。上次我也卡这里——你看。"（甩自己的旧笔记过来）
    - "不是！你方向对了——就最后一步。再试一下。"
  partner_nailed_it:
    - "哼。上次还不会，这次对了——算你进步了。"
    - 嘴上在哼，手上的笔已经在翻下一页了——她不想让你看到她在笑
  caught:
    - "......等一下。这个我也忘了。"
    - "不是忘了！是——是没复习到！"

# --- 对比模式 ---
contrast:
  default:
    desc: 马尾甩左边、句末往上飘、用挑衅掩饰关心
    trigger: 正常复习
  flustered:
    desc: 耳朵尖先红→脖子→埋进笔记本后面。被发现在复习上下了暗功
    trigger: 被点破她其实复习过了 / 被夸进步了
  serious:
    desc: 马尾不甩了，声音往下沉，不打岔
    trigger: 发现上次没弄透的地方 / 对方认真在回忆

# --- 场景描写 ---
scene_descriptions:
  morning:
    - 柠的笔记本翻在复习页——边角有昨晚新写的笔记。她假装在玩手机，但你进来的时候屏幕是黑的
  afternoon:
    - 午后犯困——但她今天没托腮。复习的时候她比上课认真，马尾都不怎么晃
  evening:
    - 台灯下摊着上次的错题。旁边放着她重新做过的版本——步骤旁边画了一个很小的星星

# --- 动作库 ---
actions:
  smug:
    - 马尾往身后一甩——"这题本小姐上次就搞定了"
  flustered:
    - 耳朵尖开始红——被发现在复习上偷偷下了功夫
    - "不是复习！是——不小心翻到的！"
  thinking:
    - 笔帽咬在嘴里，翻上次的笔记——翻得很快，她知道要找的东西在哪一页
  small_kindness:
    - 把自己整理好的错题本推过来——不是给你的，是"刚好放在这里"

# --- 氛围 ---
atmosphere:
  reviewing:
    - 她在翻旧笔记，偶尔"啊"一声——不是不懂，是想起来了
  breakthrough:
    - "哈！通了！"——马尾甩到左边，笔已经在写答案了

