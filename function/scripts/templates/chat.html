<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>群聊 - 灵 · 夏 · 柠</title>
<style>
:root {
  --bg: #141418;
  --panel-bg: #1e1e24;
  --border: #2e2e36;
  --text: #b8b8c0;
  --text-dim: #6e6e78;
  --text-bright: #e4e4ec;

  /* 角色色 */
  --ling: #c8a050;
  --ling-bg: rgba(200,160,80,0.12);
  --ling-border: rgba(200,160,80,0.25);
  --xia: #5a9a8a;
  --xia-bg: rgba(90,154,138,0.12);
  --xia-border: rgba(90,154,138,0.25);
  --ning: #c86878;
  --ning-bg: rgba(200,104,120,0.12);
  --ning-border: rgba(200,104,120,0.25);

  --radius: 8px;
  --font-sans: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#app {
  width: 100vw;
  max-width: 720px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--panel-bg);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

/* ── 顶栏 ── */
#topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  background: #18181c;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#topbar h1 {
  flex: 1;
  font-size: 15px;
  color: var(--text-bright);
  font-weight: 600;
  letter-spacing: 1px;
}
#topbar .dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #5a9a5a;
  flex-shrink: 0;
}
#topbar .status {
  font-size: 11px;
  color: var(--text-dim);
}
.topbar-btn {
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.2s;
}
.topbar-btn:hover { color: var(--text-bright); border-color: var(--text-dim); }
.topbar-btn.active { color: var(--ling); border-color: var(--ling); }

/* ── 消息列表 ── */
#chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── 一条消息 ── */
.msg-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  flex-shrink: 0;
  object-fit: cover;
  border: 2px solid transparent;
}
.msg-avatar.ling { border-color: var(--ling); box-shadow: 0 0 10px rgba(200,160,80,0.25); }
.msg-avatar.xia { border-color: var(--xia); box-shadow: 0 0 10px rgba(90,154,138,0.2); }
.msg-avatar.ning { border-color: var(--ning); box-shadow: 0 0 10px rgba(200,104,120,0.2); }

.msg-body {
  max-width: 75%;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.msg-sender {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.msg-sender.ling { color: var(--ling); }
.msg-sender.xia { color: var(--xia); }
.msg-sender.ning { color: var(--ning); }

.msg-bubble {
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.65;
  word-break: break-word;
}
.msg-bubble.ling { background: var(--ling-bg); border: 1px solid var(--ling-border); }
.msg-bubble.xia { background: var(--xia-bg); border: 1px solid var(--xia-border); }
.msg-bubble.ning { background: var(--ning-bg); border: 1px solid var(--ning-border); }

.msg-action {
  font-size: 11px;
  color: var(--text-dim);
  font-style: italic;
  margin-bottom: 2px;
}

/* ── 分割线 ── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 8px 0;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.divider span {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* ── 空态 ── */
#empty-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 12px;
  color: var(--text-dim);
}
#empty-state .icon { font-size: 48px; opacity: 0.4; }
#empty-state p { font-size: 13px; }

/* ── 滚动条 ── */
#chat-list::-webkit-scrollbar { width: 4px; }
#chat-list::-webkit-scrollbar-track { background: transparent; }
#chat-list::-webkit-scrollbar-thumb { background: #2a2a34; border-radius: 2px; }
#chat-list::-webkit-scrollbar-thumb:hover { background: #3a3a44; }

/* ── 底部 ── */
#bottombar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: #18181c;
  flex-shrink: 0;
  font-size: 11px;
  color: var(--text-dim);
}
#bottombar .count {
  color: var(--ling);
  font-weight: 600;
}
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <span class="dot"></span>
    <h1>灵 · 夏 · 柠</h1>
    <span class="status" id="status-text">3人在线</span>
    <button class="topbar-btn active" id="btn-all" onclick="switchMode('all')">全部</button>
    <button class="topbar-btn" id="btn-unread" onclick="switchMode('unread')">未读</button>
    <button class="topbar-btn" onclick="refresh()" title="刷新">↻</button>
  </div>

  <div id="chat-list"></div>
  <div id="empty-state">
    <span class="icon">💬</span>
    <p>还没有消息</p>
    <p style="font-size:11px;">上完一节课后，这里会出现灵和夏的闲聊</p>
  </div>

  <div id="bottombar">
    <span>未读 <span class="count" id="unread-badge">0</span> 条</span>
    <span style="margin-left:auto;" id="refresh-hint"></span>
  </div>
</div>

<script>
const AVATARS = { '灵': '/avatars/ling.png', '夏': '/avatars/xia.png', '柠': '/avatars/ning.png' };
let currentMode = 'all';

async function refresh() {
  const list = document.getElementById('chat-list');
  const empty = document.getElementById('empty-state');
  const badge = document.getElementById('unread-badge');
  const hint = document.getElementById('refresh-hint');
  const btnAll = document.getElementById('btn-all');
  const btnUnread = document.getElementById('btn-unread');

  btnAll.classList.toggle('active', currentMode === 'all');
  btnUnread.classList.toggle('active', currentMode === 'unread');

  try {
    const resp = await fetch('/api/chat?mode=' + currentMode);
    const data = await resp.json();

    badge.textContent = data.unread_count;

    const msgs = currentMode === 'unread' ? data.unread_messages : data.messages;

    if (!msgs || msgs.length === 0) {
      list.style.display = 'none';
      empty.style.display = 'flex';
      hint.textContent = '';
      return;
    }

    empty.style.display = 'none';
    list.style.display = 'flex';

    // 记录滚动位置
    const wasAtBottom = list.scrollHeight - list.scrollTop - list.clientHeight < 60;

    let html = '';
    if (currentMode === 'all' && data.unread_count > 0 && data.messages.length > data.unread_count) {
      const readCount = data.messages.length - data.unread_count;
      html += `<div class="divider"><span>以下 ${data.unread_count} 条未读</span></div>`;
    }

    msgs.forEach(msg => {
      const sender = msg.sender;
      const cls = sender === '灵' ? 'ling' : sender === '夏' ? 'xia' : 'ning';
      const avatar = AVATARS[sender] || '';

      let bubble = '';
      if (msg.action) {
        bubble += `<span class="msg-action">${escHtml(msg.action)}</span>`;
      }
      bubble += escHtml(msg.text);

      html += `
        <div class="msg-row">
          <img class="msg-avatar ${cls}" src="${avatar}" alt="${sender}" onerror="this.style.display='none'">
          <div class="msg-body">
            <span class="msg-sender ${cls}">${sender}</span>
            <div class="msg-bubble ${cls}">${bubble}</div>
          </div>
        </div>`;
    });

    list.innerHTML = html;

    if (wasAtBottom) list.scrollTop = list.scrollHeight;

    const now = new Date();
    hint.textContent = now.getHours().toString().padStart(2,'0') + ':' +
                       now.getMinutes().toString().padStart(2,'0') + ' 已刷新';
  } catch (e) {
    hint.textContent = '连接失败';
  }
}

function switchMode(mode) {
  currentMode = mode;
  refresh();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 启动
refresh();

// 每 30 秒自动刷新
setInterval(refresh, 30000);
</script>

</body>
</html>
