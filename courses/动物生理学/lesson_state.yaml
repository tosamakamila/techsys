conclusions:
  - 脂质双分子层是自组装结构：亲水端朝膜内外，疏水端朝向膜中央
  - 膜蛋白贯穿全膜→转运；膜表面→受体/抗原
  - 四种转运判断标准：方向（顺/逆浓度）、耗能（是/否ATP）、膜蛋白（无/载体/通道/泵）
  - 葡萄糖进大多数细胞是易化扩散（顺浓度+载体），不是主动转运
  - 三个研究水平：细胞分子 → 器官系统 → 整体，三层互相印证
  - 兴奋性 = 受刺激时产生动作电位的能力（现代定义）
  - 内环境稳态 = 动态相对稳定，不是恒定不变
  - 神经调节 = 反射弧 = 迅速+准确+局限+短暂
  - 体液调节 = 激素经血液 = 较慢+广泛+持久
  - 自身调节 = 组织细胞本身特性，不依赖外来神经或体液
  - 神经-体液调节 = 开关在神经、执行靠激素（三级管理轴）
  - 负反馈：往回拉，维稳；正反馈：往前推，破局
  - 前馈：预见性调控，在反馈之前提前调整

