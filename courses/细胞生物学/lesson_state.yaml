course_type: 新课
fragment: L001a
fragment_topic: 绪论上——细胞学说+细胞类型+化学组成
lesson_plan: 教材直讲
source: materials/细胞生物学_考点笔记.md

covered:
  - 细胞发现史（胡克1665→列文虎克1674→布朗1831）
  - 细胞学说三条（施莱登&施旺1838-1839→魏尔啸1855）
  - 细胞分化逻辑（干细胞→特化细胞，多样性是分化的结果）
  - 红细胞案例（无核无细胞器的功能性完整）
  - 原生质概念（历史意义：确认细胞内物质是活的）

interrupted_at: 未覆盖——原核/古核/真核+病毒（L001b）

excluded: []

done_condition: 完成绪论上半段

tags: [绪论上, 细胞学说, 细胞分化]

conclusions:
  - 细胞学说三条是细胞生物学的骨架，理解记忆而非死记
  - 细胞分化不丢基因，是选择性表达——红细胞主动精简结构换取功能效率
  - "完整"分结构完整和功能完整两层，特化细胞结构不完整但功能做到极致
  - 原生质概念确立了"细胞内物质是活的、有化学活性的"，后被更精确的分子描述替代

stuck: []

next_suggestions:
  - 从细菌 vs 红细胞的对比切入原核/真核区别（都无核，逻辑不同——一个分化丢掉，一个从未进化出来）
  - 用病毒挑战"细胞来自细胞"——病毒不能独立繁殖，算不算生命？
  - 注意原核/真核对比概念密度高，多停多检验，避免列表演示

entry_line: |
  上次聊完了细胞学说的发展——从胡克到魏尔啸，三条核心钉牢了，还顺带聊了红细胞怎么把自己精简成一个纯粹的氧气运输工具。
  今天接着往下——细胞也不全是我们上次聊的那种。有的细胞连细胞核都没进化出来。要不要看看？
