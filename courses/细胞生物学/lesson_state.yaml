course_type: 新课
fragment: L001b
fragment_topic: 绪论下——原核/古核/真核+病毒
lesson_plan: 教材直讲
source: materials/细胞生物学_考点笔记.md

covered:
  - 原核细胞基本结构（无核膜、环状DNA、转录翻译同步）
  - 革兰氏染色机制（G+肽聚糖厚染紫青霉素敏感 vs G-外膜脂质染红青霉素不敏感）
  - 支原体（最小最简单的细胞，唯一无细胞壁原核生物）
  - 古细菌特征（极端环境、分子机制接近真核、洛基古菌）
  - 真核细胞三大体系（生物膜体系、遗传信息结构体系、细胞骨架体系）
  - 病毒结构和生活史五步（吸附→侵入→复制→成熟→释放）
  - 类病毒和朊病毒
  - 病毒起源三种假说

interrupted_at: 完成

excluded: []

done_condition: 完成绪论下半段

tags: [绪论下, 原核细胞, 真核细胞, 病毒]

conclusions:
  - 原核vs真核差异核心是"有没有膜把空间分区"，而非"简单vs复杂"
  - 革兰氏染色差异由肽聚糖厚薄+外膜有无决定，直接关联青霉素敏感性
  - 真核三大体系：生物膜分区、遗传信息表达、骨架支撑运输
  - 病毒不必站队"算不算生命"——关键是搞清楚用什么标准在量
  - 用户主动反馈：连环追问无效时需要先用比喻建立具象锚点，S3优先于S4/S5

stuck: []

next_suggestions:
  - 下节课推进到研究方法（显微镜+细胞分离+基因操作技术），概念偏技术向
  - 注意概念密度控制，本次四线并推密度偏高
  - 保持比喻先于术语的策略——本次图书馆比喻（核膜=墙）效果显著

entry_line: |
  上次把绪论收尾了——原核真核古核三条线拉通，加上病毒那个"算不算生命"的麻烦精。今天换换脑子，搞点看得见摸得着的——显微镜，从光学到电子，看看我们是怎么看到细胞里面的东西的。
